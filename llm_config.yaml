providers:
  openai:
    type: openai
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"

  anthropic:
    type: anthropic
    base_url: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"

  z_ai:
    type: openai_compatible
    base_url: "https://api.z.ai/v1"
    api_key: "${Z_AI_API_KEY}"

  minimax:
    type: openai_compatible
    base_url: "https://api.minimaxi.chat/v1"
    api_key: "${MINIMAX_API_KEY}"

  together:
    type: openai_compatible
    base_url: "https://api.together.xyz/v1"
    api_key: "${TOGETHER_API_KEY}"

  ollama_local:
    type: openai_compatible
    base_url: "http://ollama:11434/v1"
    api_key: "ollama"

  vllm_local:
    type: openai_compatible
    base_url: "http://vllm:8000/v1"
    api_key: "none"

agents:
  orchestrator:
    provider: openai
    model: "gpt-4o-mini"
    temperature: 0.0
    max_tokens: 2048
    fallback:
      provider: z_ai
      model: "gpt-4o-mini"

  analyst:
    provider: anthropic
    model: "claude-sonnet-4-20250514"
    temperature: 0.3
    max_tokens: 4096
    fallback:
      provider: openai
      model: "gpt-4o"

  architect:
    provider: anthropic
    model: "claude-sonnet-4-20250514"
    temperature: 0.2
    max_tokens: 8192
    fallback:
      provider: z_ai
      model: "claude-sonnet-4-20250514"

  coder:
    provider: anthropic
    model: "claude-sonnet-4-20250514"
    temperature: 0.1
    max_tokens: 16384
    fallback:
      provider: together
      model: "Qwen/Qwen2.5-Coder-32B-Instruct"

  reviewer:
    provider: openai
    model: "gpt-4o"
    temperature: 0.2
    max_tokens: 4096
    fallback:
      provider: minimax
      model: "MiniMax-Text-01"

  tester:
    provider: openai
    model: "gpt-4o"
    temperature: 0.0
    max_tokens: 4096

  delivery:
    provider: anthropic
    model: "claude-sonnet-4-20250514"
    temperature: 0.2
    max_tokens: 8192

embedding:
  provider: openai
  model: "text-embedding-3-small"
  fallback:
    provider: ollama_local
    model: "nomic-embed-text"

defaults:
  timeout_seconds: 120
  max_retries: 3
  retry_delay_seconds: 5
